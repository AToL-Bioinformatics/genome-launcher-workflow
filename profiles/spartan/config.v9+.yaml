---
apptainer-prefix: $SINGULARITY_CACHEDIR/library
cluster-generic-cancel-cmd: scancel
cluster-generic-status-cmd: status-sacct-robust.sh
cluster-generic-submit-cmd: mkdir -p logs/slurm/{rule} &&
  sbatch
  --time={resources.runtime}
  {resources.partitionFlag}
  --cpus-per-task={threads}
  --mem={resources.mem_mb}
  --job-name={rule}-smk
  --output=logs/slurm/{rule}/{rule}-%j.out
  --parsable
configfile:
  - profiles/spartan/workflow.config.yaml
default-resources:
  - partitionFlag=""
  - mem_mb=4000
  - runtime=5
executor: cluster-generic
jobs: 128
keep-going: true
keep-storage-local-copies: true
latency-wait: 60
local-cores: 2
max-jobs-per-second: 50
max-status-checks-per-second: 10
printshellcmds: true
rerun-incomplete: true
rerun-triggers:
  - mtime
restart-times: 0
singularity-args: -B ${PWD},${TMPDIR},/data
  --nv
  -H $(mktemp -d)
  --pwd ${PWD}
  --containall --cleanenv --writable-tmpfs
  --env BPA_APIKEY=${BPA_APIKEY}
  --env BPA_MIRROR_PASSWD=${BPA_MIRROR_PASSWD}
  --env BPA_MIRROR_USER=${BPA_MIRROR_USER}
  --env RCLONE_CONFIG_UPLOAD_ACCESS_KEY_ID=${RCLONE_CONFIG_UPLOAD_ACCESS_KEY_ID}
  --env RCLONE_CONFIG_UPLOAD_ENDPOINT=${RCLONE_CONFIG_UPLOAD_ENDPOINT}
  --env RCLONE_CONFIG_UPLOAD_PROVIDER=${RCLONE_CONFIG_UPLOAD_PROVIDER}
  --env RCLONE_CONFIG_UPLOAD_SECRET_ACCESS_KEY=${RCLONE_CONFIG_UPLOAD_SECRET_ACCESS_KEY}
  --env RCLONE_CONFIG_UPLOAD_TYPE=${RCLONE_CONFIG_UPLOAD_TYPE}
singularity-prefix: $SINGULARITY_CACHEDIR/library
use-conda: False
use-singularity: true
